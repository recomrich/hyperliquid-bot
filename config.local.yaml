# Paramètres gérés par le bot — ne pas modifier manuellement
# Ce fichier écrase config.yaml sans le toucher

risk:
  trailing_stop_pct: 2.0        # trailing 2% sous le pic
  max_positions_per_symbol: 1   # 1 position par crypto max

strategies:
  cycle_trader:
    enabled: true
    min_reliability: 35         # abaissé de 40% à 35% pour débloquer les trades
  btc_trend:
    enabled: true
    timeframe: "1h"
    ema_periods: [20, 50, 200]
    rsi_buy_min: 40
    rsi_buy_max: 65
    rsi_sell_min: 35
    rsi_sell_max: 60
